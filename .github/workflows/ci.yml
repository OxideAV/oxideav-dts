name: CI

# Two CI paths:
#
# * `ci` (default-features) — uses the OxideAV org-level reusable workflow,
#   which exercises the registry-integrated path (oxideav-core dep +
#   Decoder trait impl).
# * `ci-standalone` (no-default-features) — inline job that builds the
#   lib with `--no-default-features --lib`, exercising the
#   `oxideav-core`-free standalone path. Catches regressions where
#   the registry / Decoder paths accidentally leak into modules a
#   standalone consumer expects to remain dep-free (header parser,
#   14-bit unpacker, Error / Result types).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    uses: OxideAV/.github/.github/workflows/crate-ci.yml@master
    secrets: inherit

  ci-standalone:
    name: Build (no-default-features --lib)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: standalone

      - name: Build (--no-default-features --lib)
        run: cargo build --no-default-features --lib --verbose

      - name: Test (--no-default-features --lib)
        run: cargo test --no-default-features --lib --verbose
